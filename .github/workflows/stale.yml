name: Mark stale issues and pull requests

on:
  schedule:
    - cron: "30 1 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: "This issue has been inactive for 60 days. It will be closed in 14 days if no further activity occurs."
          stale-pr-message: "This pull request has been inactive for 60 days. It will be closed in 14 days if no further activity occurs."
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"
