name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          shellcheck $(find . -name '*.sh' -not -path '*/bats/*' -not -path '*/.git/*')

  bats:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run bats tests
        run: bats tests/
