name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          shellcheck $(find . -name '*.sh' -not -path '*/bats/*' -not -path '*/.git/*')

  bats:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Run bats tests
        run: ./tests/bats/bin/bats tests/
